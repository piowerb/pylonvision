<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>PylonVision | Under Construction</title>
    <meta name="description" content="PylonVision is currently undergoing scheduled upgrades.">
    <meta name="theme-color" content="#050507">
    
    <link rel="icon" type="image/png" href="main-logo-pylonvision.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Inter:wght@700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <style>
        :root {
            --primary: #7C3AED;
            --primary-glow: #8B5CF6;
            --bg-body: #050507;
            --text-main: #FFFFFF;
            --text-muted: #9CA3AF;
            --font-display: 'Inter', sans-serif;
            --font-body: 'DM Sans', sans-serif;
            --particle-color: rgba(255,255,255,0.4); /* Subtelniejszy kolor cząsteczek dla minimalizmu */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            font-family: var(--font-body);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            overflow: hidden;
            position: relative;
        }

        /* Tło z animacją */
        #constellation-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* Subtelna fioletowa poświata na środku ekranu */
        .glow-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: radial-gradient(circle at center, rgba(124, 58, 237, 0.08) 0%, transparent 60%);
            z-index: 1;
            pointer-events: none;
        }

        /* Pojemnik na treść */
        .container {
            position: relative;
            z-index: 2; /* Wyżej niż tło */
            padding: 20px;
            max-width: 600px;
            animation: fadeIn 1s ease-out;
        }

        .brand {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-family: var(--font-display);
            font-weight: 800;
            font-size: 1.5rem;
            margin-bottom: 50px;
        }

        .brand img {
            height: 42px;
            filter: drop-shadow(0 0 15px rgba(124, 58, 237, 0.4));
        }

        .badge {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 100px;
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 1px;
            background: rgba(124, 58, 237, 0.1);
            border: 1px solid rgba(124, 58, 237, 0.3);
            color: var(--primary-glow);
            margin-bottom: 24px;
            text-transform: uppercase;
        }

        h1 {
            font-family: var(--font-display);
            font-size: clamp(2rem, 5vw, 3.5rem);
            line-height: 1.1;
            letter-spacing: -0.03em;
            margin-bottom: 20px;
        }

        h1 span {
            background: linear-gradient(135deg, #FFFFFF 20%, #A78BFA 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: var(--text-muted);
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 40px;
        }

        .social-links {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .social-links a {
            color: var(--text-muted);
            font-size: 1.2rem;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .social-links a:hover {
            color: var(--primary-glow);
            transform: translateY(-3px);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <canvas id="constellation-canvas"></canvas>
    <div class="glow-overlay"></div>

    <div class="container">
        <!-- Logo -->
        <div class="brand">
            <img src="main-logo-pylonvision.png" alt="PylonVision Logo">
            PylonVision
        </div>

        <!-- Główna treść -->
        <div class="badge">System Upgrade</div>
        <h1>Building the <span>Future.</span></h1>
        <p>We are currently engineering a system upgrade. PylonVision will be back online shortly with new automation protocols.</p>

        <!-- Linki -->
        <div class="social-links">
            <a href="https://x.com/PylonVision" target="_blank" aria-label="Twitter"><i class="fa-brands fa-x-twitter"></i></a>
            <a href="https://www.youtube.com/@PylonVision" target="_blank" aria-label="YouTube"><i class="fa-brands fa-youtube"></i></a>
            <a href="https://www.linkedin.com/company/pylonvision" target="_blank" aria-label="LinkedIn"><i class="fa-brands fa-linkedin-in"></i></a>
            <a href="mailto:admin@pylonvision.com" aria-label="Email"><i class="fa-solid fa-envelope"></i></a>
        </div>
    </div>

    <!-- Skrypt animacji tła -->
    <script>
        (function() {
            const canvas = document.getElementById('constellation-canvas');
            if(!canvas) return;
            const ctx = canvas.getContext('2d');
            let width, height;
            let particles = [];
            const particleCount = 50; // Nieco mniej cząsteczek, aby zachować minimalizm
            const connectionDistance = 150;

            function resize() {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width;
                canvas.height = height;
            }
            window.addEventListener('resize', resize);
            resize();

            class Particle {
                constructor() {
                    this.x = Math.random() * width;
                    this.y = Math.random() * height;
                    this.vx = (Math.random() - 0.5) * 0.5;
                    this.vy = (Math.random() - 0.5) * 0.5;
                    this.size = Math.random() * 2;
                }
                update() {
                    this.x += this.vx;
                    this.y += this.vy;
                    if (this.x < 0 || this.x > width) this.vx *= -1;
                    if (this.y < 0 || this.y > height) this.vy *= -1;
                }
                draw() {
                    ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--particle-color').trim();
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            function init() {
                particles = [];
                for (let i = 0; i < particleCount; i++) {
                    particles.push(new Particle());
                }
            }

            function animate() {
                ctx.clearRect(0, 0, width, height);
                for (let i = 0; i < particles.length; i++) {
                    particles[i].update();
                    particles[i].draw();
                    for (let j = i; j < particles.length; j++) {
                        const dx = particles[i].x - particles[j].x;
                        const dy = particles[i].y - particles[j].y;
                        const distance = Math.sqrt(dx * dx + dy * dy);
                        if (distance < connectionDistance) {
                            ctx.beginPath();
                            ctx.strokeStyle = `rgba(124, 58, 237, ${(1 - distance/connectionDistance) * 0.5})`; // Lekko przezroczyste linie
                            ctx.lineWidth = 0.5;
                            ctx.moveTo(particles[i].x, particles[i].y);
                            ctx.lineTo(particles[j].x, particles[j].y);
                            ctx.stroke();
                        }
                    }
                }
                requestAnimationFrame(animate);
            }
            init();
            animate();
        })();
    </script>
</body>
</html>
